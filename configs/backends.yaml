# Backend endpoints and operational config.
# LAN topology: laptop (orchestrator) + RTX 2080 desktop (worker).
# Set endpoint to http://<2080-lan-ip>:<port> once the worker is running.

workers:
  wan21_lowpoly:
    endpoint: null              # e.g. http://192.168.1.42:8080
    auth_token_env: "LAN_WORKER_TOKEN"
    max_concurrent: 1
    timeout_sec: 600

  wan21_lowpoly_i2v:
    endpoint: null              # Phase 2: same worker, i2v mode
    auth_token_env: "LAN_WORKER_TOKEN"
    max_concurrent: 1
    timeout_sec: 600

  sdxl_keyframe:
    endpoint: null              # Phase 2: SDXL keyframe generation
    auth_token_env: "LAN_WORKER_TOKEN"
    max_concurrent: 1
    timeout_sec: 180

# Object storage for outputs.
storage:
  provider: "local"             # local | s3 | r2 | minio
  local_root: "./cache"
  s3_bucket: null
  s3_region: null

# Global budget caps (defense against runaway jobs).
budget:
  max_cost_per_generation_usd: 1.00
  max_cost_per_day_usd: 10.00
