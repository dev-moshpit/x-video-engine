# Alembic config for the SaaS API.
#
# Run from the project root:
#   pnpm dev:db:upgrade            # alembic upgrade head
#   pnpm dev:db:revision -- "msg"  # alembic revision --autogenerate
#
# DATABASE_URL is read by migrations/env.py at runtime — the
# sqlalchemy.url below is only the fallback for offline mode.

[alembic]
script_location = %(here)s/migrations
version_path_separator = os
sqlalchemy.url = postgresql://saas:saas@localhost:5432/saas

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
